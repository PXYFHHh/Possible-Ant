<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="page-chat">

  <!-- TopBar -->
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button id="menuToggleBtn" class="menu-toggle" type="button" aria-label="菜单">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="brand">
        <div class="brand-icon">A</div>
        <span>Agent Console</span>
      </div>
    </div>
    <nav class="topnav">
      <a class="nav-link active" href="/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        聊天
      </a>
      <a class="nav-link" href="/knowledge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        知识库
        <span id="kbIngestBadge" class="kb-ingest-badge" style="display:none;">
          <span class="kb-ingest-spinner"></span>
          入库中
        </span>
      </a>
    </nav>
  </header>

  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <main class="layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">

      <!-- New conversation + search -->
      <div class="sidebar-section">
        <button id="newConversationButton" class="btn-new-chat" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新建对话
        </button>
        <div class="search-input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="searchInput" class="search-input" type="text" placeholder="搜索对话..." autocomplete="off">
        </div>
      </div>

      <!-- Conversation list -->
      <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
        <ul id="conversationList" class="conversation-list"></ul>
        <div id="conversationEmpty" class="empty-tip">暂无历史对话</div>
      </div>

      <!-- Footer actions -->
      <div class="sidebar-footer">
        <div class="sidebar-footer-row">
          <button id="resetMemoryBtn" class="btn-reset-memory" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
            清空记忆
          </button>
          <button id="batchModeBtn" class="btn-batch-mode" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
            批量管理
          </button>
        </div>
        <div id="batchActionBar" class="batch-action-bar" style="display:none;">
          <span class="batch-selected-count">已选 <strong id="batchCount">0</strong> 项</span>
          <div class="batch-actions">
            <button id="batchSelectAllBtn" type="button">全选</button>
            <button id="batchDeleteBtn" class="danger" type="button">删除选中</button>
            <button id="batchCancelBtn" type="button">取消</button>
          </div>
        </div>
        <div class="version-text">v1.0.0</div>
      </div>
    </aside>

    <!-- Chat panel -->
    <section class="chat-panel">
      <div id="messages" class="messages"></div>

      <div class="composer">
        <div class="composer-inner">
          <div class="composer-textarea-wrap">
            <textarea id="messageInput" rows="1" placeholder="输入问题，按 Enter 发送，Shift+Enter 换行"></textarea>
          </div>
          <div class="composer-actions">
            <div class="composer-left">
              <button class="composer-btn-icon" type="button" title="设置" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
              </button>
            </div>
            <button id="sendStopButton" class="btn-send" type="button">
              发送
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- RAG Chunk Overlay -->
  <div id="ragChunkOverlay" class="rag-overlay" style="display:none;">
    <div class="rag-overlay-backdrop"></div>
    <div class="rag-overlay-panel">
      <div class="rag-overlay-header">
        <div class="rag-overlay-title-row">
          <span id="ragOverlayTitle" class="rag-overlay-title">片段详情</span>
          <span id="ragOverlayIndex" class="rag-overlay-index">1 / 5</span>
        </div>
        <button id="ragOverlayClose" class="rag-overlay-close" type="button">&times;</button>
      </div>
      <div class="rag-overlay-meta" id="ragOverlayMeta"></div>
      <div class="rag-overlay-content" id="ragOverlayContent"></div>
      <div class="rag-overlay-nav">
        <button id="ragOverlayPrev" class="rag-nav-btn" type="button" disabled>&#8592; 上一个</button>
        <button id="ragOverlayNext" class="rag-nav-btn" type="button">下一个 &#8594;</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
