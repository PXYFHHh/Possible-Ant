<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 助手 - 知识库</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="page-kb">

  <header class="topbar">
    <div class="brand">Agent Console</div>
    <nav class="topnav">
      <a class="nav-link" href="/">聊天</a>
      <a class="nav-link active" href="/knowledge">
        知识库
        <span id="kbIngestBadge" class="kb-ingest-badge" style="display:none;">
          <span class="kb-ingest-spinner"></span>
          入库中
        </span>
      </a>
    </nav>
  </header>

  <main class="kb-page">

    <!-- Upload Section -->
    <section class="kb-card kb-upload-card">
      <div class="kb-card-header">
        <div class="kb-card-title-row">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <h2>文档入库</h2>
        </div>
        <p class="kb-card-desc">支持 txt / md / pdf / docx 格式，上传后自动切片并构建索引</p>
      </div>

      <div class="upload-zone" id="uploadZone">
        <input id="uploadInput" type="file" accept=".txt,.md,.markdown,.pdf,.docx" hidden>
        <div class="upload-zone-content">
          <div class="upload-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="12" y1="18" x2="12" y2="12"/>
              <polyline points="9 15 12 12 15 15"/>
            </svg>
          </div>
          <p class="upload-text">拖拽文件到此处，或<span class="upload-link">点击选择</span></p>
          <p class="upload-hint">单个文件不超过 50MB</p>
        </div>
        <div class="upload-file-info" id="uploadFileInfo" style="display:none;">
          <div class="upload-file-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </div>
          <span class="upload-file-name" id="uploadFileName"></span>
          <button class="upload-file-clear" id="uploadFileClear" type="button">&times;</button>
        </div>
      </div>

      <button id="uploadButton" class="btn-primary btn-upload" type="button" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        上传并入库
      </button>

      <div id="uploadResult" class="upload-result" style="display:none;"></div>
    </section>

    <!-- Documents List -->
    <section class="kb-card kb-docs-card">
      <div class="kb-card-header">
        <div class="kb-card-title-row">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/>
            <polyline points="13 2 13 9 20 9"/>
          </svg>
          <h2>已入库文档</h2>
          <span class="kb-badge" id="docsCount">0</span>
        </div>
        <button id="refreshDocsButton" class="btn-icon" type="button" title="刷新列表">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
          </svg>
        </button>
      </div>

      <div class="docs-list" id="docsList"></div>
      <div id="docsEmpty" class="kb-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/>
          <polyline points="13 2 13 9 20 9"/>
        </svg>
        <p>暂无文档</p>
        <span>上传文档后即可在此处管理</span>
      </div>
    </section>

    <!-- Chunks Distribution -->
    <section class="kb-card kb-chunks-card">
      <div class="kb-card-header">
        <div class="kb-card-title-row">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="9" y1="21" x2="9" y2="9"/>
          </svg>
          <h2>切片分布统计</h2>
          <span class="kb-badge" id="chunksCount">0</span>
        </div>
        <button id="refreshChunksButton" class="btn-icon" type="button" title="刷新统计">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
          </svg>
        </button>
      </div>
      <div class="chunks-stats-summary" id="chunksStatsSummary" style="display:none;">
        <span>最小: <strong id="chunksMin">0</strong></span>
        <span>最大: <strong id="chunksMax">0</strong></span>
        <span>平均: <strong id="chunksAvg">0</strong></span>
      </div>
      <div class="chunks-distribution" id="chunksDistribution"></div>
      <div id="chunksEmpty" class="kb-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="9" y1="21" x2="9" y2="9"/>
        </svg>
        <p>暂无切片数据</p>
        <span>上传文档后即可查看切片分布</span>
      </div>
    </section>

    <!-- RAG Health Status -->
    <section class="kb-card kb-health-card">
      <div class="kb-card-header">
        <div class="kb-card-title-row">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
          <h2>RAG 健康状态</h2>
        </div>
        <button id="refreshHealthButton" class="btn-icon" type="button" title="刷新状态">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
          </svg>
        </button>
      </div>
      <pre class="health-output" id="healthOutput">加载中...</pre>
    </section>

  </main>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Modal Container -->
  <div id="modalContainer"></div>

  <script src="{{ url_for('static', filename='js/knowledge.js') }}"></script>
</body>
</html>
